services:
  ssg:
    build:
      context: ../..
      dockerfile: packages/ssg/Dockerfile
    image: defuss-ssg:local
    command:
      - serve
      - /workspace
      - --multicore
      - --host
      - 0.0.0.0
      - --port
      - "3000"
    ports:
      - "3000:3000"
    volumes:
      - ${SSG_SITE:-../../example-ssg}:/workspace
      - ssg_node_modules:/workspace/node_modules

  ssg-dev:
    profiles: ["dev"]
    build:
      context: ../..
      dockerfile: packages/ssg/Dockerfile
    image: defuss-ssg:local
    command:
      - dev
      - /workspace
      - --host
      - 0.0.0.0
      - --port
      - "3000"
    ports:
      - "3000:3000"
    volumes:
      - ${SSG_SITE:-../../example-ssg}:/workspace
      - ssg_node_modules:/workspace/node_modules

volumes:
  ssg_node_modules:
