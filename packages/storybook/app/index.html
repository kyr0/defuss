<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>defuss Storybook</title>
  <script>
    // Apply dark mode preference
    if (localStorage.getItem("basecoat:theme") === "dark" ||
      (!localStorage.getItem("basecoat:theme") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
      document.documentElement.classList.add("dark");
    }
  </script>
</head>
<body class="min-h-screen bg-background text-foreground">
  <div id="app"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
